<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A quiet public signal page for LSB and ZYT."
    />
    <title>LSB / ZYT Signal</title>
    <link rel="stylesheet" href="./styles.css?v=memory-node-01" />
  </head>
  <body>
    <main class="signal-page" data-stage="0" data-memory="0">
      <section class="stage" aria-label="LSB and ZYT signal">
        <header class="memory-header">
          <p class="eyebrow">
            QUIET SIGNAL / <span data-memory-status>MEMORY 00 OF 01</span>
          </p>
          <div class="memory-progress" aria-hidden="true"><span></span></div>
        </header>

        <div class="memory-grid">
          <div class="signal-column">
            <div class="signal-field">
              <div class="orbit orbit-lsb" aria-hidden="true"></div>
              <div class="orbit orbit-zyt" aria-hidden="true"></div>
              <button class="core" type="button" aria-label="释放第一段记忆">
                <span></span>
              </button>
              <div class="butterfly" aria-hidden="true">
                <i class="wing wing-upper wing-left"></i>
                <i class="wing wing-upper wing-right"></i>
                <i class="wing wing-lower wing-left"></i>
                <i class="wing wing-lower wing-right"></i>
                <b class="butterfly-body"></b>
              </div>
            </div>

            <div class="pair" aria-label="signal controls">
              <button class="mark mark-lsb" type="button" data-signal="LSB">
                LSB
              </button>
              <span class="divider">/</span>
              <button class="mark mark-zyt" type="button" data-signal="ZYT">
                ZYT
              </button>
            </div>

            <p class="memory-hint" data-memory-hint>
              轻触蝴蝶，释放第一段记忆
            </p>
          </div>

          <article class="memory-panel" aria-live="polite" aria-hidden="true">
            <p class="memory-index">01 / ORIGIN</p>
            <h1>佛陀做媒</h1>
            <p class="memory-origin">缘起 ·《悉达多》</p>
            <blockquote>“你怎么被拉黑了”</blockquote>
            <p class="memory-caption">故事从这里开始。</p>
          </article>
        </div>
      </section>
    </main>

    <button class="sound" type="button" aria-pressed="false">sound</button>
    <footer>© 2026 Liangshanbobo · LSB / ZYT · Built as a quiet signal</footer>
    <script src="./script.js?v=memory-node-01"></script>
  </body>
</html>
