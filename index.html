<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A quiet public signal page for LSB and ZYT."
    />
    <title>LSB / ZYT Signal</title>
    <link rel="stylesheet" href="./styles.css?v=cyber-butterfly-1" />
  </head>
  <body>
    <main class="signal-page" data-stage="0">
      <section class="stage" aria-label="LSB and ZYT signal">
        <p class="eyebrow">QUIET SIGNAL / 00.17</p>

        <div class="signal-field" aria-hidden="true">
          <div class="orbit orbit-lsb"></div>
          <div class="orbit orbit-zyt"></div>
          <button class="core" type="button" aria-label="signal core">
            <span></span>
          </button>
          <div class="butterfly">
            <i class="wing wing-upper wing-left"></i>
            <i class="wing wing-upper wing-right"></i>
            <i class="wing wing-lower wing-left"></i>
            <i class="wing wing-lower wing-right"></i>
            <b class="butterfly-body"></b>
          </div>
        </div>

        <div class="pair" aria-label="signal controls">
          <button class="mark mark-lsb" type="button" data-signal="LSB">
            LSB
          </button>
          <span class="divider">/</span>
          <button class="mark mark-zyt" type="button" data-signal="ZYT">
            ZYT
          </button>
        </div>

        <h1>Some signals are meant to be understood quietly.</h1>
        <p class="lede">
          公开的一页，只保留可以被看见的部分。书、城市、未来，都藏在同一束信号里。
        </p>

        <div class="fragments" aria-live="polite">
          <p class="fragment" data-fragment="0">BOOK / 当下的力量</p>
          <p class="fragment" data-fragment="1">COORD / 深圳 ⇄ 成都</p>
          <p class="fragment" data-fragment="2">FUTURE / 相拥</p>
        </div>

        <p class="secret" aria-live="polite">
          等两束信号重合，答案就是相拥。
        </p>
      </section>
    </main>

    <button class="sound" type="button" aria-pressed="false">sound</button>
    <footer>© 2026 Liangshanbobo · LSB / ZYT · Built as a quiet signal</footer>
    <script src="./script.js"></script>
  </body>
</html>
